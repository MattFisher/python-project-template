version: 2
updates:
  # Bump the SHA-pinned GitHub Actions (opens PRs with changelogs + the new pin).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Keep Python dependencies (pyproject.toml + uv.lock) current.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
