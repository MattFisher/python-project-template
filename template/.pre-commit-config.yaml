repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: c59bba8fb259db0fec2bbb77ad8ba51ea7341b56 # v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815 # v1.26.1
    hooks:
      # Several of zizmor's audits (artipacked, impostor-commit,
      # known-vulnerable-actions, stale-action-refs, ref-version-mismatch, ...)
      # need to query the GitHub API for upstream Actions metadata, which isn't
      # reliably available in every environment this runs in (sandboxes,
      # restricted networks). Split into two hooks so local runs always get
      # zizmor's offline coverage (most of its ruleset) without depending on
      # network access, while CI - which has real network + a real GH_TOKEN -
      # additionally runs the online-only audits via `--hook-stage manual`
      # (see the Pre-commit step in test.yml).
      - id: zizmor
        name: zizmor (offline checks)
        args: [--no-online-audits]
      - id: zizmor
        name: zizmor (online checks - GitHub API, CI only)
        stages: [manual]

  - repo: https://github.com/executablebooks/mdformat
    rev: 82912cdaea4fb830f751504486a7879c70526547 # 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm # padded/aligned tables + GFM extensions (task lists, strikethrough)
