# Latest Python version we support — keeps hook envs consistent.
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: c59bba8fb259db0fec2bbb77ad8ba51ea7341b56 # v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: b7359babf83a050dcd7bf892538f3df09c3d4ba6 # 0.11.29
    hooks:
      - id: uv-lock # keep uv.lock in sync with pyproject.toml

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
    hooks:
      - id: actionlint # GitHub Actions correctness (complements zizmor's security audits)

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95 # v0.11.0.1
    hooks:
      - id: shellcheck # lints shell scripts (e.g. .claude/hooks/session-start.sh)

  - repo: https://github.com/crate-ci/typos
    rev: bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
    hooks:
      - id: typos # spell-check code, comments, and docs

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815 # v1.26.1
    hooks:
      # Several of zizmor's audits (artipacked, impostor-commit,
      # known-vulnerable-actions, stale-action-refs, ref-version-mismatch, ...)
      # need to query the GitHub API for upstream Actions metadata, which isn't
      # reliably available in every environment this runs in (sandboxes,
      # restricted networks). Split into two hooks so local runs always get
      # zizmor's offline coverage (most of its ruleset) without depending on
      # network access, while CI - which has real network + a real GH_TOKEN -
      # additionally runs the online-only audits via `--hook-stage manual`.
      # `--persona=auditor` is zizmor's most thorough mode; findings at any
      # severity fail the run.
      - id: zizmor
        name: zizmor (offline checks)
        args: [--no-online-audits, --persona=auditor]
      - id: zizmor
        name: zizmor (online checks - GitHub API, CI only)
        args: [--persona=auditor]
        stages: [manual]

  - repo: https://github.com/executablebooks/mdformat
    rev: 82912cdaea4fb830f751504486a7879c70526547 # 1.0.0
    hooks:
      - id: mdformat
        # Formatting config (wrap, number, ...) lives in .mdformat.toml.
        additional_dependencies:
          - mdformat-gfm # padded/aligned tables + GFM extensions (task lists, strikethrough)
